<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Re:Spot Artists</title>
</head>
<body class="page" data-page="artists">
    <aside class="sidebar" aria-label="Main navigation">
        <a class="sidebar__brand" href="index.html" aria-label="Re:Spot home"><img class="sidebar__brand-mark" src="logo.png" alt=""><span class="sidebar__brand-name">Re:Spot</span></a>
        <nav class="primary-nav sidebar__nav" aria-label="Primary">
            <a class="primary-nav__link" href="index.html"><span class="primary-nav__icon primary-nav__icon--home"></span>Home</a>
            <a class="primary-nav__link" href="search.html"><span class="primary-nav__icon primary-nav__icon--search"></span>Search</a>
            <a class="primary-nav__link" href="#"><span class="primary-nav__icon primary-nav__icon--browse"></span>Browse</a>
            <a class="primary-nav__link" href="#"><span class="primary-nav__icon primary-nav__icon--radio"></span>Radio</a>
        </nav>
        <section class="library" aria-labelledby="library-title">
            <div class="library__heading"><h2 class="library__title" id="library-title">Your library</h2><button class="library__create-button" type="button" aria-label="Create playlist">+</button></div>
            <nav class="library__nav" aria-label="Library"><a class="library__link" href="playlists.html"><span class="library__icon library__icon--playlist"></span>Playlists</a><a class="library__link library__link--active" href="artists.html"><span class="library__icon library__icon--artist"></span>Artists</a><a class="library__link" href="albums.html"><span class="library__icon library__icon--album"></span>Albums</a>
            </nav>
        </section>
    </aside>

    <main class="page__main">
        <header class="topbar">
            <div class="topbar__history" aria-label="History navigation"><button class="topbar__history-button" type="button" aria-label="Back">&lsaquo;</button><button class="topbar__history-button" type="button" aria-label="Forward">&rsaquo;</button></div>
            <div class="topbar__actions"><a class="pill-button" href="upload-track.html">Upload track</a></div>
        </header>

        <section class="hero hero--compact" aria-labelledby="artists-page-title">
            <h1 id="artists-page-title" class="hero__title" data-page-title>Artists</h1>
            <p class="hero__text" data-page-subtitle>Artists from the full music library</p>
        </section>

        <section class="content-section" aria-labelledby="artists-grid-title">
            <div class="content-section__heading"><div><h2 id="artists-grid-title">All artists</h2></div></div>
            <div class="card-grid card-grid--artists" data-card-grid></div>
        </section>
    </main>

    <button class="floating-player" type="button" aria-label="Play">&#9654;</button>
    <script src="../javascript/music-data.js"></script>
    <script src="../javascript/library-pages.js"></script>
</body>
</html>
