<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Re:Spot Search</title>
</head>
<body class="page" data-page="search">
    <aside class="sidebar" aria-label="Main navigation">
        <a class="sidebar__brand" href="index.html" aria-label="Re:Spot home">
            <img class="sidebar__brand-mark" src="logo.png" alt="">
            <span class="sidebar__brand-name">Re:Spot</span>
        </a>

        <nav class="primary-nav sidebar__nav" aria-label="Primary">
            <a class="primary-nav__link" href="index.html"><span class="primary-nav__icon primary-nav__icon--home"></span>Home</a>
            <a class="primary-nav__link primary-nav__link--active" href="search.html"><span class="primary-nav__icon primary-nav__icon--search"></span>Search</a>
            <a class="primary-nav__link" href="#"><span class="primary-nav__icon primary-nav__icon--browse"></span>Browse</a>
            <a class="primary-nav__link" href="#"><span class="primary-nav__icon primary-nav__icon--radio"></span>Radio</a>
        </nav>

        <section class="library" aria-labelledby="library-title">
            <div class="library__heading">
                <h2 class="library__title" id="library-title">Your library</h2>
                <button class="library__create-button" type="button" aria-label="Create playlist">+</button>
            </div>

            <nav class="library__nav" aria-label="Library"><a class="library__link" href="playlists.html"><span class="library__icon library__icon--playlist"></span>Playlists</a><a class="library__link" href="artists.html"><span class="library__icon library__icon--artist"></span>Artists</a><a class="library__link" href="albums.html"><span class="library__icon library__icon--album"></span>Albums</a>
            </nav>
        </section>
    </aside>

    <main class="page__main">
        <header class="topbar">
            <div class="topbar__search">
                <span class="topbar__search-icon"></span>
                <input class="topbar__search-input" data-search-input type="search" placeholder="Search tracks or artists" aria-label="Search tracks or artists" autofocus>
            </div>

            <div class="topbar__actions">
                <a class="pill-button" href="upload-track.html">Upload track</a>
            </div>
        </header>

        <section class="hero hero--compact" aria-labelledby="search-title">
            <h1 id="search-title" class="hero__title" data-page-title>Search</h1>
            <p class="hero__text" data-page-subtitle>Type a track or artist name</p>
        </section>

        <section class="content-section" aria-label="Search results">
            <div class="track-list" data-track-list></div>
            <p class="empty-state" data-empty-state hidden>No tracks found</p>
        </section>
    </main>

    <button class="floating-player" type="button" aria-label="Play">&#9654;</button>
    <script src="../javascript/music-data.js"></script>
    <script src="../javascript/library-pages.js"></script>
</body>
</html>
